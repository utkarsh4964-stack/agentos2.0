<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — AgentOS</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <a href="/" class="logo">AgentOS</a>
    <h1>Log in</h1>
    <p class="subtitle">Welcome back. Build, run, and sell AI pipelines.</p>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password">

      <div class="error" id="error-message"></div>

      <button type="submit" id="submit-btn">Log in</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || 'Login failed');
        }

        localStorage.setItem('agentos_token', data.access_token);
        localStorage.setItem('agentos_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
