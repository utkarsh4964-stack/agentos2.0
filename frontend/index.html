<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentOS — Build, run, and sell AI pipelines</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .container { max-width: 640px; padding-top: 120px; text-align: center; }
    .logo { text-align: left; }
    h1 { font-size: 36px; line-height: 1.2; }
    .subtitle { font-size: 16px; max-width: 480px; margin: 0 auto 32px; }
    .cta-row { display: flex; gap: 12px; justify-content: center; }
    .cta-row button { width: auto; padding: 11px 24px; }
    .secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">AgentOS</a>
    <h1>The platform where anyone can build, run, and sell AI pipelines</h1>
    <p class="subtitle">Describe what you want in plain English. AgentOS builds the pipeline, runs it, and gets smarter every time.</p>
    <div class="cta-row">
      <a href="/signup"><button>Get started</button></a>
      <a href="/login"><button class="secondary">Log in</button></a>
    </div>
  </div>
</body>
</html>
