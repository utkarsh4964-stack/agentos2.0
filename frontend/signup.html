<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — AgentOS</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <a href="/" class="logo">AgentOS</a>
    <h1>Create your account</h1>
    <p class="subtitle">Build your first AI pipeline in minutes — no code required.</p>

    <form id="signup-form">
      <label for="name">Name</label>
      <input type="text" id="name" required autocomplete="name">

      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" required minlength="8" autocomplete="new-password">

      <div class="error" id="error-message"></div>

      <button type="submit" id="submit-btn">Create account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('signup-form');
    const errorEl = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || 'Could not create account');
        }

        localStorage.setItem('agentos_token', data.access_token);
        localStorage.setItem('agentos_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
